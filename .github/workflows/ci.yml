# @dependency-start
# upstream implementation ../../tools/ci/run_all_checks.sh repository CI entrypoint
# upstream implementation ../../Makefile ci target contract
# @dependency-end
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install pip dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docker/requirements.txt

      - name: Run repository CI
        run: make ci

  agent-canon-pr:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install pip dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docker/requirements.txt

      - name: Run shared canon PR gate
        run: make agent-canon-pr-check

  fresh-clone-acceptance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install pip dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docker/requirements.txt

      - name: Run fresh clone acceptance
        run: make fresh-clone-check
