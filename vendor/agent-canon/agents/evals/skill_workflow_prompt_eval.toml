[[evals]]
id = "adaptive-improvement-loop-skill-shim"
target = ".agents/skills/adaptive-improvement-loop/SKILL.md"
kind = "skill"
description = "The discoverable Codex skill must route iterative improvement through goal.md and prompt evals."

[[evals.checklist]]
id = "AIL-SHIM-1"
critical = true
description = "Mentions the top-level goal contract and goal loop tool."
required_regex = ["goal\\.md", "goal_loop\\.py"]

[[evals.checklist]]
id = "AIL-SHIM-2"
critical = true
description = "Requires frozen eval definitions before prompt or workflow tuning."
required_regex = ["agents/evals/skill_workflow_prompt_eval\\.toml", "evaluate_skill_workflow_prompts\\.py"]

[[evals.checklist]]
id = "AIL-SHIM-3"
critical = true
description = "Blocks loop closeout while eval drift remains."
required_regex = ["Do not close", "eval"]

[[evals]]
id = "adaptive-improvement-loop-human-skill"
target = "agents/skills/adaptive-improvement-loop.md"
kind = "skill"
description = "The human skill canon must explain eval-driven prompt repair for iterative loops."

[[evals.checklist]]
id = "AIL-HUMAN-1"
critical = true
description = "Requires goal.md and goal_loop.py for repo-level loops."
required_regex = ["goal\\.md", "goal_loop\\.py"]

[[evals.checklist]]
id = "AIL-HUMAN-2"
critical = true
description = "Requires an eval per tested skill and workflow."
required_regex = ["skill/workflow", "eval"]

[[evals.checklist]]
id = "AIL-HUMAN-3"
critical = true
description = "Requires prompt repair and rerun until no eval deviation remains."
required_regex = ["prompt", "rerun", "no eval deviation"]

[[evals]]
id = "adaptive-improvement-workflow"
target = "agents/workflows/adaptive-improvement-workflow.md"
kind = "workflow"
description = "The workflow must make eval definition, measurement, prompt repair, and rerun a first-class loop stage."

[[evals.checklist]]
id = "AIL-WF-1"
critical = true
description = "Defines evals before choosing or changing an iteration."
required_regex = ["skill/workflow eval", "agents/evals/skill_workflow_prompt_eval\\.toml"]

[[evals.checklist]]
id = "AIL-WF-2"
critical = true
description = "Runs the mechanical eval tool and uses its report as evidence."
required_regex = ["evaluate_skill_workflow_prompts\\.py", "EVAL_STATUS=pass"]

[[evals.checklist]]
id = "AIL-WF-3"
critical = true
description = "Repairs prompts and reruns the same eval until drift is gone."
required_regex = ["prompt repair", "rerun", "eval drift"]
