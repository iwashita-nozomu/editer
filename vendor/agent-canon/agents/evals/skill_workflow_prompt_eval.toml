# @dependency-start
# responsibility Defines deterministic evals for skill and workflow prompt drift.
# upstream design README.md prompt eval directory contract
# upstream design ../skills/adaptive-improvement-loop.md adaptive improvement skill contract
# downstream implementation ../../tools/agent_tools/evaluate_skill_workflow_prompts.py runs these evals
# @dependency-end

version = 1

[[evals]]
id = "all-discoverable-skill-shims"
target_glob = ".agents/skills/*/SKILL.md"
expected_count = 25
kind = "skill"
description = "Every discoverable Codex skill shim must be loadable and dependency-linked."

[[evals.checklist]]
id = "SKILL-SHIM-GENERIC-1"
critical = true
description = "Starts with YAML frontmatter and includes required name/description fields."
required_regex = ["\\A---\\n", "\\nname:\\s*[-a-z0-9]+", "\\ndescription:\\s*\\S"]

[[evals.checklist]]
id = "SKILL-SHIM-GENERIC-2"
critical = true
description = "Includes dependency manifest markers near the top of the file."
required_regex = ["@dependency-start", "@dependency-end"]

[[evals.checklist]]
id = "SKILL-SHIM-GENERIC-3"
critical = true
description = "Provides an executable numbered instruction list."
required_regex = ["(?m)^1\\.\\s+"]

[[evals]]
id = "all-human-skill-docs"
target_glob = "agents/skills/*.md"
expected_count = 47
kind = "skill"
description = "Every human-facing skill document must be dependency-linked and reader-addressable."

[[evals.checklist]]
id = "SKILL-DOC-GENERIC-1"
critical = true
description = "Includes dependency manifest markers."
required_regex = ["@dependency-start", "@dependency-end"]

[[evals.checklist]]
id = "SKILL-DOC-GENERIC-2"
critical = true
description = "Includes a top-level Markdown title."
required_regex = ["(?m)^#\\s+"]

